name: Deploy UiPath Solution

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      environment_name:
        description: GitHub environment to deploy through
        required: true
        default: Production
        type: string
      deployment_folder:
        description: Target Orchestrator folder name
        required: true
        default: Shared
        type: string
      deployment_parent_folder:
        description: Optional Orchestrator parent folder for the deployment folder
        required: false
        type: string
      library_orchestrator_folder:
        description: Orchestrator folder used to restore and pack dependencies
        required: true
        default: CICD_MathAgent
        type: string
      create_folder_processes:
        description: Create or update normal folder processes after deploying the solution
        required: true
        default: true
        type: boolean
      folder_process_package_name:
        description: Optional Orchestrator package source name to add as a folder process
        required: false
        type: string
      config_path:
        description: Optional solution deployment config path in this repository
        required: false
        type: string
      activate_deployment:
        description: Activate the deployment after deploying
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  UIPATH_CLI_VERSION: 25.10.12
  SOLUTION_VERSION: 1.0.${{ github.run_number }}
  APPLICATION_SCOPE: AutomationSolutions Solutions.Deployments Solutions.Deployments.Read Solutions.Deployments.Write Solutions.Packages Solutions.Packages.Read Solutions.Packages.Write
  LIBRARY_ORCHESTRATOR_APPLICATION_SCOPE: OR.Default

jobs:
  deploy:
    name: Deploy solution
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name || 'Production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover solution
        run: |
          mapfile -t solution_files < <(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f -name "*.uipx" | sort)

          if [ "${#solution_files[@]}" -eq 0 ]; then
            echo "No .uipx solution file found at the repository root."
            exit 1
          fi

          if [ "${#solution_files[@]}" -gt 1 ]; then
            echo "Multiple .uipx solution files found at the repository root. Keep one solution file or add an explicit workflow input."
            printf '%s\n' "${solution_files[@]}"
            exit 1
          fi

          solution_path="${solution_files[0]}"
          solution_file="$(basename "$solution_path")"
          solution_name="${solution_file%.uipx}"

          echo "SOLUTION_PATH=$solution_path" >> "$GITHUB_ENV"
          echo "SOLUTION_NAME=$solution_name" >> "$GITHUB_ENV"

      - name: Validate UiPath configuration
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          ORCHESTRATOR_TENANT: ${{ secrets.ORCHESTRATOR_TENANT }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          EXTERNAL_APP_ID: ${{ secrets.EXTERNAL_APP_ID }}
          EXTERNAL_APP_SECRET: ${{ secrets.EXTERNAL_APP_SECRET }}
        run: |
          missing=()

          if [ -z "$ORCHESTRATOR_URL" ]; then
            missing+=(ORCHESTRATOR_URL)
          fi

          if [ -z "$ORCHESTRATOR_TENANT" ]; then
            missing+=(ORCHESTRATOR_TENANT)
          fi

          if [ -z "$ORG_NAME" ]; then
            missing+=(ORG_NAME)
          fi

          if [ -z "$EXTERNAL_APP_ID" ]; then
            missing+=(EXTERNAL_APP_ID)
          fi

          if [ -z "$EXTERNAL_APP_SECRET" ]; then
            missing+=(EXTERNAL_APP_SECRET)
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required UiPath GitHub secret(s): ${missing[*]}"
            echo "Add them as repository secrets, or as secrets on the GitHub environment selected by this job."
            exit 1
          fi

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install UiPath CLI
        run: |
          dotnet tool install --global UiPath.CLI.Linux --version "$UIPATH_CLI_VERSION"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore solution dependencies
        env:
          LIBRARY_ORCHESTRATOR_FOLDER: ${{ inputs.library_orchestrator_folder || 'CICD_MathAgent' }}
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          ORCHESTRATOR_TENANT: ${{ secrets.ORCHESTRATOR_TENANT }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          EXTERNAL_APP_ID: ${{ secrets.EXTERNAL_APP_ID }}
          EXTERNAL_APP_SECRET: ${{ secrets.EXTERNAL_APP_SECRET }}
        run: |
          uipcli solution restore "$SOLUTION_PATH" \
            --libraryOrchestratorUrl "$ORCHESTRATOR_URL" \
            --libraryOrchestratorTenant "$ORCHESTRATOR_TENANT" \
            --libraryOrchestratorAccountForApp "$ORG_NAME" \
            -I "$EXTERNAL_APP_ID" \
            -S "$EXTERNAL_APP_SECRET" \
            --libraryOrchestratorApplicationScope "$LIBRARY_ORCHESTRATOR_APPLICATION_SCOPE" \
            --libraryOrchestratorFolder "$LIBRARY_ORCHESTRATOR_FOLDER" \
            --restoreFolder "$RUNNER_TEMP/uipath-restore" \
            --traceLevel Information

      - name: Pack solution
        env:
          GIT_SERVER_URL: ${{ github.server_url }}
          GIT_REPOSITORY: ${{ github.repository }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
          LIBRARY_ORCHESTRATOR_FOLDER: ${{ inputs.library_orchestrator_folder || 'CICD_MathAgent' }}
          DEPLOYMENT_FOLDER: ${{ inputs.deployment_folder || 'Shared' }}
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          ORCHESTRATOR_TENANT: ${{ secrets.ORCHESTRATOR_TENANT }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          EXTERNAL_APP_ID: ${{ secrets.EXTERNAL_APP_ID }}
          EXTERNAL_APP_SECRET: ${{ secrets.EXTERNAL_APP_SECRET }}
        run: |
          mkdir -p "$RUNNER_TEMP/packages"

          uipcli solution pack "$SOLUTION_PATH" \
            --output "$RUNNER_TEMP/packages" \
            --version "$SOLUTION_VERSION" \
            --libraryOrchestratorUrl "$ORCHESTRATOR_URL" \
            --libraryOrchestratorTenant "$ORCHESTRATOR_TENANT" \
            --libraryOrchestratorAccountForApp "$ORG_NAME" \
            --libraryOrchestratorApplicationId "$EXTERNAL_APP_ID" \
            --libraryOrchestratorApplicationSecret "$EXTERNAL_APP_SECRET" \
            --libraryOrchestratorApplicationScope "$LIBRARY_ORCHESTRATOR_APPLICATION_SCOPE" \
            --libraryOrchestratorFolder "$LIBRARY_ORCHESTRATOR_FOLDER" \
            --repositoryUrl "$GIT_SERVER_URL/$GIT_REPOSITORY" \
            --repositoryCommit "$GIT_SHA" \
            --repositoryBranch "$GIT_REF_NAME" \
            --repositoryType git \
            --traceLevel Information

          package_path="$(find "$RUNNER_TEMP/packages" \( -name "$SOLUTION_NAME.$SOLUTION_VERSION.zip" -o -name "${SOLUTION_NAME}_${SOLUTION_VERSION}.zip" \) -print -quit)"
          if [ -z "$package_path" ]; then
            echo "Could not find packed solution $SOLUTION_NAME.$SOLUTION_VERSION.zip or ${SOLUTION_NAME}_${SOLUTION_VERSION}.zip"
            find "$RUNNER_TEMP/packages" -maxdepth 1 -type f -print
            exit 1
          fi

          echo "PACKAGE_PATH=$package_path" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_NAME=$SOLUTION_NAME-$DEPLOYMENT_FOLDER" >> "$GITHUB_ENV"

      - name: Upload solution package
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          ORCHESTRATOR_TENANT: ${{ secrets.ORCHESTRATOR_TENANT }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          EXTERNAL_APP_ID: ${{ secrets.EXTERNAL_APP_ID }}
          EXTERNAL_APP_SECRET: ${{ secrets.EXTERNAL_APP_SECRET }}
        run: |
          uipcli solution upload-package "$PACKAGE_PATH" \
            -U "$ORCHESTRATOR_URL" \
            -T "$ORCHESTRATOR_TENANT" \
            -A "$ORG_NAME" \
            -I "$EXTERNAL_APP_ID" \
            -S "$EXTERNAL_APP_SECRET" \
            --applicationScope "$APPLICATION_SCOPE" \
            --traceLevel Information

      - name: Deploy solution
        env:
          DEPLOYMENT_FOLDER: ${{ inputs.deployment_folder || 'Shared' }}
          DEPLOYMENT_PARENT_FOLDER: ${{ inputs.deployment_parent_folder }}
          CONFIG_PATH: ${{ inputs.config_path }}
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          ORCHESTRATOR_TENANT: ${{ secrets.ORCHESTRATOR_TENANT }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          EXTERNAL_APP_ID: ${{ secrets.EXTERNAL_APP_ID }}
          EXTERNAL_APP_SECRET: ${{ secrets.EXTERNAL_APP_SECRET }}
        run: |
          deploy_args=(
            "$SOLUTION_NAME"
            -v "$SOLUTION_VERSION"
            -d "$DEPLOYMENT_NAME"
            -f "$DEPLOYMENT_FOLDER"
            -U "$ORCHESTRATOR_URL"
            -T "$ORCHESTRATOR_TENANT"
            -A "$ORG_NAME"
            -I "$EXTERNAL_APP_ID"
            -S "$EXTERNAL_APP_SECRET"
            --applicationScope "$APPLICATION_SCOPE"
            --traceLevel Information
          )

          if [ -n "$DEPLOYMENT_PARENT_FOLDER" ]; then
            deploy_args+=(--deploymentParentFolder "$DEPLOYMENT_PARENT_FOLDER")
          fi

          if [ -n "$CONFIG_PATH" ]; then
            deploy_args+=(--configPath "$GITHUB_WORKSPACE/$CONFIG_PATH")
          fi

          uipcli solution deploy "${deploy_args[@]}"

      - name: Activate deployment
        if: ${{ github.event_name == 'push' || inputs.activate_deployment }}
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          ORCHESTRATOR_TENANT: ${{ secrets.ORCHESTRATOR_TENANT }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          EXTERNAL_APP_ID: ${{ secrets.EXTERNAL_APP_ID }}
          EXTERNAL_APP_SECRET: ${{ secrets.EXTERNAL_APP_SECRET }}
        run: |
          uipcli solution deploy-activate "$DEPLOYMENT_NAME" \
            -U "$ORCHESTRATOR_URL" \
            -T "$ORCHESTRATOR_TENANT" \
            -A "$ORG_NAME" \
            -I "$EXTERNAL_APP_ID" \
            -S "$EXTERNAL_APP_SECRET" \
            --applicationScope "$APPLICATION_SCOPE" \
            --traceLevel Information

      - name: Create folder process from package source
        if: ${{ github.event_name == 'push' || inputs.create_folder_processes }}
        env:
          DEPLOYMENT_FOLDER: ${{ inputs.deployment_folder || 'Shared' }}
          FOLDER_PROCESS_PACKAGE_NAME: ${{ inputs.folder_process_package_name }}
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          ORCHESTRATOR_TENANT: ${{ secrets.ORCHESTRATOR_TENANT }}
          ORG_NAME: ${{ secrets.ORG_NAME }}
          EXTERNAL_APP_ID: ${{ secrets.EXTERNAL_APP_ID }}
          EXTERNAL_APP_SECRET: ${{ secrets.EXTERNAL_APP_SECRET }}
        run: |
          package_name="$FOLDER_PROCESS_PACKAGE_NAME"
          if [ -z "$package_name" ]; then
            package_name="$(jq -r '.resource.spec.packageName // empty' resources/solution_folder/process/processOrchestration/*.json | head -n 1)"
          fi

          if [ -z "$package_name" ]; then
            echo "Could not determine the package source name for the folder process."
            exit 1
          fi

          process_name="$package_name"
          orchestrator_base="${ORCHESTRATOR_URL%/}/${ORG_NAME}/${ORCHESTRATOR_TENANT}/orchestrator_"
          identity_url="${ORCHESTRATOR_URL%/}/identity_/connect/token"

          access_token="$(curl -fsS -X POST "$identity_url" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=$EXTERNAL_APP_ID" \
            --data-urlencode "client_secret=$EXTERNAL_APP_SECRET" \
            --data-urlencode "scope=$LIBRARY_ORCHESTRATOR_APPLICATION_SCOPE" \
            | jq -r '.access_token')"

          if [ -z "$access_token" ] || [ "$access_token" = "null" ]; then
            echo "Could not retrieve an Orchestrator access token."
            exit 1
          fi

          existing_release_json="$(curl -fsS "$orchestrator_base/odata/Releases?\$filter=Name%20eq%20'$process_name'&\$select=Id,Key,Name,ProcessVersion&\$count=true" \
            -H "Authorization: Bearer $access_token" \
            -H "X-UIPATH-FolderPath: $DEPLOYMENT_FOLDER")"

          existing_release_id="$(echo "$existing_release_json" | jq -r '.value[0].Id // empty')"
          existing_release_version="$(echo "$existing_release_json" | jq -r '.value[0].ProcessVersion // empty')"

          if [ -n "$existing_release_id" ]; then
            echo "Updating process '$process_name' from version '$existing_release_version' to the latest package version in folder '$DEPLOYMENT_FOLDER'."
            curl -fsS -X POST "$orchestrator_base/odata/Releases($existing_release_id)/UiPath.Server.Configuration.OData.UpdateToLatestPackageVersion" \
              -H "Authorization: Bearer $access_token" \
              -H "Content-Type: application/json" \
              -H "X-UIPATH-FolderPath: $DEPLOYMENT_FOLDER" \
              --data "{}"
          else
            package_version="$(curl -fsS "$orchestrator_base/odata/Processes/UiPath.Server.Configuration.OData.GetProcessVersions(processId='$package_name')" \
              -H "Authorization: Bearer $access_token" \
              -H "X-UIPATH-FolderPath: $DEPLOYMENT_FOLDER" \
              | jq -r '(.value | map(select(.IsLatestVersion == true)) | first | .Version) // ([.value[]] | sort_by(.Published) | last | .Version)')"

            if [ -z "$package_version" ] || [ "$package_version" = "null" ]; then
              echo "Could not find an available package version for '$package_name' in folder '$DEPLOYMENT_FOLDER'."
              exit 1
            fi

            jq -n \
              --arg name "$process_name" \
              --arg processKey "$package_name" \
              --arg processVersion "$package_version" \
              --arg description "Created by GitHub Actions" \
              '{
                Name: $name,
                ProcessKey: $processKey,
                ProcessVersion: $processVersion,
                Description: $description
              }' > "$RUNNER_TEMP/create-release.json"

            curl -fsS -X POST "$orchestrator_base/odata/Releases" \
              -H "Authorization: Bearer $access_token" \
              -H "Content-Type: application/json" \
              -H "X-UIPATH-FolderPath: $DEPLOYMENT_FOLDER" \
              --data @"$RUNNER_TEMP/create-release.json"
          fi

      - name: Upload packed solution artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uipath-solution-${{ env.SOLUTION_VERSION }}
          path: ${{ runner.temp }}/packages/*.zip
          if-no-files-found: ignore
